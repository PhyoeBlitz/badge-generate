name: Bug Report
description: Report a problem with the Hexagon Badge Generator
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Enter SkillIcons URL '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: skillicons-url
    attributes:
      label: SkillIcons URL used (if applicable)
      placeholder: "https://skillicons.dev/icons?i=ts,react,python"
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "e.g. Chrome 120 on Windows 11"
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Screenshots / additional context
    validations:
      required: false
